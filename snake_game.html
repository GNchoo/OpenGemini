<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGemini Snake Game</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --canvas-bg: #16213e;
            --snake-head: #4ecca3;
            --snake-body: #45b293;
            --food-color: #e94560;
            --text-color: #ffffff;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
        }

        canvas {
            background-color: var(--canvas-bg);
            display: block;
        }

        .stats {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .overlay.hidden {
            display: none;
        }

        h1 {
            margin-bottom: 20px;
            color: var(--snake-head);
            font-size: 48px;
        }

        button {
            background-color: var(--snake-head);
            border: none;
            color: var(--bg-color);
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.3);
        }

        button:hover {
            transform: scale(1.05);
            background-color: #5eddb3;
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }

        .score-list {
            margin-top: 20px;
            width: 200px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div id="startOverlay" class="overlay">
            <h1>Snake Game</h1>
            <button id="startButton">Start Game</button>
            <div class="controls-hint">
                Use Arrow Keys or WASD to move<br>
                Eat the red dots to grow!
            </div>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <h1 style="color: var(--food-color);">Game Over</h1>
            <div style="font-size: 24px; margin-bottom: 20px;">Final Score: <span id="finalScore">0</span></div>
            <button id="restartButton">Try Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let gameLoop;
        let gameActive = false;
        let speed = 100;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            nextDx = 0;
            nextDy = -1;
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.innerText = score;
            createFood();
            gameActive = true;
        }

        function startGame() {
            initGame();
            startOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, speed);
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Make sure food doesn't spawn on snake
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    createFood();
                    break;
                }
            }
        }

        function draw() {
            if (!gameActive) return;

            update();
            
            // Clear canvas
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines (subtle)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food
            ctx.fillStyle = '#e94560';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#e94560';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#4ecca3' : '#45b293';
                
                // Rounded rectangle for snake parts
                const r = 5;
                const x = part.x * gridSize + 2;
                const y = part.y * gridSize + 2;
                const w = gridSize - 4;
                const h = gridSize - 4;

                ctx.beginPath();
                ctx.roundRect(x, y, w, h, r);
                ctx.fill();

                if (isHead) {
                    // Eyes
                    ctx.fillStyle = '#1a1a2e';
                    const eyeSize = 2;
                    if (dx === 1) { // Right
                        ctx.fillRect(x + w - 6, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + w - 6, y + h - 6, eyeSize, eyeSize);
                    } else if (dx === -1) { // Left
                        ctx.fillRect(x + 4, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + 4, y + h - 6, eyeSize, eyeSize);
                    } else if (dy === -1) { // Up
                        ctx.fillRect(x + 4, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + w - 6, y + 4, eyeSize, eyeSize);
                    } else if (dy === 1) { // Down
                        ctx.fillRect(x + 4, y + h - 6, eyeSize, eyeSize);
                        ctx.fillRect(x + w - 6, y + h - 6, eyeSize, eyeSize);
                    }
                }
            });
        }

        function update() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
                // Speed up slightly
                if (speed > 50) {
                    clearInterval(gameLoop);
                    speed -= 1;
                    gameLoop = setInterval(draw, speed);
                }
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            finalScoreElement.innerText = score;
            gameOverOverlay.classList.remove('hidden');
        }

        window.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { nextDx = 0; nextDy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { nextDx = 0; nextDy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { nextDx = 1; nextDy = 0; }
                    break;
            }
        });

        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);

        // Initial draw
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
